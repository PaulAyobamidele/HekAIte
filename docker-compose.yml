version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-guardian-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_guardian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-guardian-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-guardian-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_guardian
      REDIS_URL: redis://redis:6379/0
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: "AI Guardian"
      SECRET_KEY: "your-secret-key-change-in-production-use-openssl-rand-hex-32"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      HALLUCINATION_THRESHOLD: "0.7"
      SAFETY_THRESHOLD: "0.8"
      CONFIDENCE_THRESHOLD: "0.6"
      MAX_WORKERS: "4"
      CACHE_TTL: "3600"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
