version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-guardian-postgres-prod
    environment:
      POSTGRES_USER: ai_guardian
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ai_guardian_prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_guardian"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-guardian-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-guardian-api-prod
    environment:
      DATABASE_URL: postgresql://ai_guardian:${DB_PASSWORD}@postgres:5432/ai_guardian_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: "AI Guardian"
      SECRET_KEY: ${SECRET_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HALLUCINATION_THRESHOLD: ${HALLUCINATION_THRESHOLD:-0.7}
      SAFETY_THRESHOLD: ${SAFETY_THRESHOLD:-0.8}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.6}
      MAX_WORKERS: ${MAX_WORKERS:-4}
      CACHE_TTL: ${CACHE_TTL:-3600}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-guardian-frontend-prod
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ai-guardian-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  postgres_data_prod:
  redis_data_prod:
